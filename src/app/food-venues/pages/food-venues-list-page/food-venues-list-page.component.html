<section class="mx-auto py-8 space-y-8">
  <h1 class="text-3xl font-bold text-center">Restaurantes adheridos a la App</h1>

  @if (errorMessage() && !isBusy()) {
    <div class="flex flex-col items-center mt-10 gap-3 text-center">
      <p class="text-red-500 text-lg font-medium">
        {{ errorMessage() }}
      </p>

      <button type="button" class="btn btn-primary" (click)="retry()">
        Reintentar
      </button>
    </div>
  } @else {
    @if (isBusy()) {
      <div class="flex flex-col items-center mt-10 gap-2">
        <span class="loading loading-spinner loading-lg text-primary"></span>
        <p class="text-primary text-lg font-medium">{{ loadingText() }}</p>
      </div>
    }

    @if (!isBusy() && foodVenueResource.hasValue()) {
      <app-food-venue-list
        [foodVenues]="foodVenues()"
        [isLoading]="false"
        [errorMessage]="null"
      />
    }
  }
</section>
