<section class="bg-[#fbf6ef]">
  <div class="max-w-6xl mx-auto space-y-8">

    <!-- Header -->
    <div class="text-center">
      <h1 class="text-3xl md:text-4xl font-black text-[#1f1b16]">
        Restaurantes adheridos
      </h1>
      <p class="mt-2 text-[#3a332c]/70">
        Explorá lugares disponibles y mirá sus menús.
      </p>
    </div>

    <!-- ERROR -->
    @if (errorMessage() && !isBusy()) {
      <div class="rounded-[28px] bg-white/70 backdrop-blur border border-white shadow-xl p-8">
        <div class="text-center space-y-3">
          <p class="text-red-600 text-lg font-bold">
            {{ errorMessage() }}
          </p>

          <button
            type="button"
            class="h-12 px-6 rounded-2xl font-bold text-white shadow-lg
                   bg-gradient-to-r from-orange-500 to-amber-500
                   hover:from-orange-600 hover:to-amber-600 transition"
            (click)="retry()"
          >
            Reintentar
          </button>
        </div>
      </div>

    } @else {

      <!-- LOADING + SKELETONS -->
      @if (isBusy()) {
        <div class="rounded-[28px] bg-white/70 backdrop-blur border border-white shadow-xl p-6 md:p-8">
          <div class="flex items-center justify-center gap-3">
            <span class="loading loading-spinner loading-lg text-orange-500"></span>
            <p class="text-[#3a332c]/80 font-semibold">{{ loadingText() }}</p>
          </div>

          <!-- Skeletons (solo mientras carga, no afecta el layout final) -->
          <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            @for (i of [1,2,3,4,5,6]; track i) {
              <div class="rounded-2xl bg-white border border-orange-200/60 p-4 shadow-sm">
                <div class="h-28 rounded-xl bg-orange-100/70 animate-pulse"></div>
                <div class="mt-4 h-4 w-3/4 bg-orange-100/70 rounded animate-pulse"></div>
                <div class="mt-2 h-3 w-1/2 bg-orange-100/70 rounded animate-pulse"></div>
              </div>
            }
          </div>
        </div>
      }

      <!-- LISTA REAL (tal cual estaba antes) -->
      @if (!isBusy() && foodVenueResource.hasValue()) {
        <app-food-venue-list
          [foodVenues]="foodVenues()"
          [isLoading]="false"
          [errorMessage]="null"
        />
      }
    }

  </div>
  
</section>
