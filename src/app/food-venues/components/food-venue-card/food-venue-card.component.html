<div
  class="rounded-[28px] overflow-hidden bg-white/70 backdrop-blur
         border border-white shadow-md
         hover:shadow-xl hover:-translate-y-1
         transition-all duration-300"
>

  <!-- Banner -->
  <figure class="relative aspect-[16/6] overflow-hidden bg-gradient-to-r from-orange-100 to-amber-100">

    @if (venue().styles?.bannerUrl || venue().styles?.logoUrl) {
      <img
        [src]="venue().styles?.bannerUrl || venue().styles?.logoUrl"
        [alt]="venue().name"
        class="w-full h-full object-cover"
      />
    } @else {
      <div class="flex items-center justify-center w-full h-full">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-14 w-14 text-orange-400/60"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5"
          />
        </svg>
      </div>
    }

  </figure>

  <!-- Body -->
  <div class="p-5 md:p-6 space-y-4">

    <!-- Nombre -->
    <h3 class="text-lg md:text-xl font-black text-[#1f1b16] line-clamp-1">
      {{ venue().name }}
    </h3>

    <!-- Info -->
    <div class="space-y-2 text-sm text-[#3a332c]/80">

      <div class="flex items-center gap-2">
        <lucide-icon [img]="MapPinHouse" class="w-4 h-4 text-orange-600"></lucide-icon>
        <span class="truncate">{{ venue().address }}</span>
      </div>

      <div class="flex items-center gap-2">
        <lucide-icon [img]="MapPlus" class="w-4 h-4 text-orange-600"></lucide-icon>
        <span class="truncate">{{ venue().location }}</span>
      </div>

    </div>

    <!-- Acción -->
    <div class="pt-2">
      <button
        [routerLink]="['/food-venues', venue().publicId, 'menu']"
        class="w-full h-11 rounded-2xl font-bold text-white shadow-md
               bg-gradient-to-r from-orange-500 to-amber-500
               hover:from-orange-600 hover:to-amber-600 transition"
      >
        Ver menú
      </button>
    </div>

  </div>
</div>
