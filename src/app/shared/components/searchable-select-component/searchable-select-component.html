<div class="relative w-full">

  <div
    class="relative w-full h-11 rounded-2xl bg-white border border-orange-200/70 shadow-sm
           flex items-center
           focus-within:border-orange-400 transition"
    [class.opacity-50]="isDisabled()"
    [class.cursor-not-allowed]="isDisabled()"
    (click)="!isDisabled() && toggleDropdown()"
  >
    <input
      #inputEl
      type="text"
      class="w-full h-full pl-4 pr-10 bg-transparent outline-none text-sm cursor-text
             placeholder:text-[#3a332c]/40
             disabled:cursor-not-allowed"
      [placeholder]="isOpen() ? placeholder() : (selectedName() ? '' : currentPlaceholder())"
      [disabled]="isDisabled()"
      [value]="isOpen() ? searchText() : selectedName()"
      (input)="onSearchInput($event.target)"
      (click)="canOpen() && openDropdown()"
    />

    <span
      class="absolute right-4 top-1/2 -translate-y-1/2 text-[#3a332c]/60 text-xs transition-transform duration-200 select-none cursor-pointer"
      [class.rotate-180]="isOpen()"
    >
      ▼
    </span>
  </div>

  @if (isOpen() && !isDisabled()) {
    <div
      class="absolute z-50 w-full mt-2 rounded-2xl overflow-hidden
             bg-white/90 backdrop-blur border border-orange-200/70 shadow-2xl
             max-h-56 overflow-y-auto"
    >

      @if (filteredOptions().length === 0) {
        <div class="px-4 py-3 text-sm text-[#3a332c]/60 italic">
          Sin resultados para "{{ searchText() }}"
        </div>
      }

      @for (option of filteredOptions(); track option.id) {
        <div
          class="px-4 py-2.5 text-sm cursor-pointer select-none
                 hover:bg-orange-50 transition"
          [class.bg-orange-300]="option.id === selectedId()"
          [class.text-orange-800]="option.id === selectedId()"
          (mousedown)="selectOption(option)"
        >
          {{ option.name }}
        </div>
      }

    </div>
  }
</div>
