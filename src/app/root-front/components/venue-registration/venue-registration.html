<div class="max-w-3xl mx-auto p-4 md:p-8 animate-in fade-in duration-500">
  
  <div class="flex items-center gap-4 mb-10">
    <button (click)="navigation.navigateToRootDashboard()" class="p-2 hover:bg-orange-50 rounded-xl transition-colors">
      <lucide-icon [img]="ArrowLeft" class="w-6 h-6 text-[#3a332c]"></lucide-icon>
    </button>
    <h2 class="text-2xl font-black text-[#1f1b16]">Nuevo Establecimiento</h2>
  </div>

  <form [formGroup]="venueForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="group relative h-28 bg-white rounded-2xl border border-orange-200/70 overflow-hidden hover:border-orange-400 transition-all">
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-orange-300">
          <lucide-icon [img]="UploadCloud" class="w-6 h-6"></lucide-icon>
          <span class="text-[9px] font-black uppercase mt-1">Logo Comercial</span>
          @if (logoFile()) { <span class="text-[8px] text-green-600 font-bold truncate px-2">{{ logoFile()?.name }}</span> }
        </div>
        <input type="file" (change)="onFileChange($event, 'logo')" class="absolute inset-0 opacity-0 cursor-pointer">
      </div>

      <div class="group relative h-28 bg-white rounded-2xl border border-orange-200/70 overflow-hidden hover:border-orange-400 transition-all">
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-orange-300">
          <lucide-icon [img]="Camera" class="w-6 h-6"></lucide-icon>
          <span class="text-[9px] font-black uppercase mt-1">Banner Principal</span>
          @if (bannerFile()) { <span class="text-[8px] text-green-600 font-bold truncate px-2">{{ bannerFile()?.name }}</span> }
        </div>
        <input type="file" (change)="onFileChange($event, 'banner')" class="absolute inset-0 opacity-0 cursor-pointer">
      </div>
    </div>

    <div class="bg-white rounded-[32px] p-6 shadow-sm border border-orange-100/50 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Nombre del Local</label>
          <input formControlName="name" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm transition shadow-sm" placeholder="Ej: Pizzería Luca">
        </div>
        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Email</label>
          <input formControlName="email" type="email" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm transition shadow-sm" placeholder="admin@local.com">
        </div>
        <div class="md:col-span-2 space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Teléfono</label>
          <input formControlName="phone" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm transition shadow-sm" placeholder="+54 223 ...">
        </div>
      </div>
    </div>

    <div formGroupName="address" class="bg-white rounded-[32px] p-6 shadow-sm border border-orange-100/50 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div class="md:col-span-2 space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Calle</label>
          <input formControlName="street" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm shadow-sm transition">
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Nro</label>
          <input formControlName="number" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm shadow-sm transition">
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">País</label>
            <app-searchable-select formControlName="countryId" [options]="countries()" placeholder="País" />
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Provincia</label>
            <app-searchable-select formControlName="provinceId" [options]="provinces()" placeholder="Provincia" disabledPlaceholder="Seleccioná país" />
        </div>

        <div class="space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Ciudad</label>
            <app-searchable-select formControlName="cityId" [options]="cities()" placeholder="Ciudad" disabledPlaceholder="Seleccioná prov." />
        </div>

        <div class="space-y-1.5 md:col-span-1">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">C. Postal</label>
          <input formControlName="postalCode" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm shadow-sm transition">
        </div>

        <div class="md:col-span-2 space-y-1.5">
          <label class="text-[10px] font-black text-[#3a332c]/40 uppercase ml-2">Piso/Depto</label>
          <input formControlName="additionalInfo" class="w-full h-11 px-4 bg-white rounded-2xl border border-orange-200/70 focus:border-orange-400 outline-none text-sm shadow-sm transition" placeholder="Opcional">
        </div>
      </div>
    </div>

    <button type="submit" [disabled]="venueForm.invalid" 
            class="w-full py-4 bg-[#1f1b16] text-white rounded-[24px] font-black text-sm hover:bg-orange-600 transition-all shadow-xl active:scale-95 disabled:opacity-20">
      CONFIRMAR Y CREAR LOCAL
    </button>
  </form>
</div>
