<!-- Bottom Navigation Bar Fija -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-40 safe-area-bottom">
  <div class="grid grid-cols-4 h-16">

    <!-- Salón -->
    <a routerLink="/admin"
       routerLinkActive="!text-orange-500 bg-orange-50/70"
       [routerLinkActiveOptions]="{exact: true}"
       (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="dashboardIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Salón</span>
    </a>


    <!-- Pedidos -->
    <a routerLink="/admin/orders"
       routerLinkActive="!text-orange-500 bg-orange-50/70"
       (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="clipboardIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Pedidos</span>
    </a>

    <!-- Pagos -->
    <a routerLink="/admin/payments"
       routerLinkActive="!text-orange-500 bg-orange-50/70"
       (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="dollarIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Pagos</span>
    </a>

    <!-- Menú (toggle) -->
    <button (click)="toggleMenu()"
            [class.text-orange-500]="isMenuExpanded"
            [class.bg-orange-50]="isMenuExpanded"
            class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors cursor-pointer">
      <lucide-icon
        [img]="isMenuExpanded ? closeIcon : menuIcon"
        [size]="22">
      </lucide-icon>
      <span class="text-xs mt-1">{{ isMenuExpanded ? 'Cerrar' : 'Menú' }}</span>
    </button>

  </div>

<div
  class="fixed left-0 right-0 bottom-16 bg-white border-t border-gray-200 shadow-2xl z-[40] transition-all duration-300 ease-out overflow-y-auto"
  [ngClass]="{
    'max-h-[70vh] translate-y-0 opacity-100': isMenuExpanded,
    'max-h-0 translate-y-8 opacity-0 pointer-events-none': !isMenuExpanded
  }">

  <div class="p-4">
    <div class="mb-6">
      <!-- <p class="uppercase text-xs font-semibold text-gray-400 mb-3 px-2">
        Gestión
      </p> -->

      <!-- Productos -->
      <a routerLink="/admin/products"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="packageIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Productos</span>
      </a>

      <!-- Categorías -->
      <a routerLink="/admin/categories"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="gridIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Categorías</span>
      </a>

      <!-- Tags -->
      <a routerLink="/admin/tags"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="tagsIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Tags</span>
      </a>

      <!-- Empleados -->
      <a routerLink="/admin/employees"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="usersIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Empleados</span>
      </a>

      <!-- Estadísticas -->
      <a routerLink="/admin/analytics"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="trendingUpIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Estadísticas</span>
      </a>

       <!-- Mi Local -->
      <a routerLink="/admin/my-food-venue"
         routerLinkActive="!text-orange-500 bg-orange-50/70"
         (click)="onLinkClick()"
         class="flex items-center p-3 text-gray-700 hover:bg-gray-50 rounded-lg transition-colors mb-1">
        <lucide-icon [img]="settingsIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Mi Local</span>
      </a>
    </div>

    @if (isRootUser()) {
      <div class="mb-4 border-b border-orange-100 pb-4">
        <p class="uppercase text-[10px] font-black text-orange-400 mb-2 px-2 tracking-widest">
          Superusuario
        </p>
        <button (click)="returnToRoot()"
                class="w-full flex items-center p-3 bg-orange-50 text-orange-700 hover:bg-orange-100 rounded-xl transition-all border border-orange-200 shadow-sm cursor-pointer">
          <lucide-icon [img]="shieldIcon" [size]="20" class="mr-3"></lucide-icon>
          <span class="text-sm font-black italic">SALIR DE ESTE LOCAL</span>
        </button>
      </div>
    }

    <div class="pt-2">
      <button (click)="logout()"
              class="w-full flex items-center p-3 text-red-600 hover:bg-red-50 rounded-lg transition-colors cursor-pointer">
        <lucide-icon [img]="logOutIcon" [size]="20" class="mr-3"></lucide-icon>
        <span class="text-sm font-medium">Cerrar Sesión</span>
      </button>
    </div>
  </div>
</div>

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-[50] safe-area-bottom">
  <div class="grid grid-cols-4 h-16">

    <a routerLink="/admin" routerLinkActive="text-blue-600 bg-blue-50" [routerLinkActiveOptions]="{exact: true}"
       (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="dashboardIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Salón</span>
    </a>

    <a routerLink="/admin/orders" routerLinkActive="text-blue-600 bg-blue-50" (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="clipboardIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Pedidos</span>
    </a>

    <a routerLink="/admin/payments" routerLinkActive="text-blue-600 bg-blue-50" (click)="closeMenu()"
       class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors">
      <lucide-icon [img]="dollarIcon" [size]="22"></lucide-icon>
      <span class="text-xs mt-1">Pagos</span>
    </a>

    <button (click)="toggleMenu()"
            [class.text-blue-600]="isMenuExpanded"
            [class.bg-blue-50]="isMenuExpanded"
            class="flex flex-col items-center justify-center text-gray-600 hover:bg-gray-50 transition-colors cursor-pointer relative">
      
      <div class="relative">
        <lucide-icon [img]="isMenuExpanded ? closeIcon : menuIcon" [size]="22"></lucide-icon>
        
        @if (isRootUser()) {
          <span class="absolute -top-1 -right-1 flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-orange-500"></span>
          </span>
        }
      </div>
      <span class="text-xs mt-1">{{ isMenuExpanded ? 'Cerrar' : 'Menú' }}</span>
    </button>

  </div>
</nav>
