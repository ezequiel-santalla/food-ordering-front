<div class="fixed inset-0 z-[200]">
  <div class="fixed inset-0 bg-black/40 z-[60] backdrop-blur-[2px] animate-[fade-in_0.15s_ease-out]"
    (click)="close.emit()"></div>

  <div class="fixed inset-0 z-[70] flex items-center justify-center p-4 pointer-events-none">
    <div class="bg-base-100 rounded-3xl shadow-2xl max-w-lg w-full max-h-full overflow-hidden pointer-events-auto
             animate-[slide-up_0.3s_cubic-bezier(0.16,1,0.3,1)]
             flex flex-col border border-orange-200/60
             shadow-[0_20px_60px_-20px_rgba(0,0,0,0.25)]" (click)="$event.stopPropagation()">
      <figure class="relative flex-shrink-0">
        <div class="w-full aspect-[4/3] bg-gradient-to-br from-orange-100/70 to-amber-200/40
                 flex items-center justify-center overflow-hidden">
          <img
            [src]="product().imageUrl || 'https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp'"
            [alt]="product().name" class="w-full h-full object-cover" />
        </div>

        <button class="absolute top-4 right-4 btn btn-circle btn-sm
                 bg-base-100/90 backdrop-blur-sm border border-orange-200/60
                 shadow-lg hover:bg-base-100 hover:scale-110 transition-transform" (click)="close.emit()"
          aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>

        @if (product().category) {
        <div class="absolute bottom-4 left-4">
          <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold
                         bg-orange-500/10 text-orange-800 border border-orange-200/70 shadow-sm">
            {{ product().category }}
          </span>
        </div>
        }

        <div class="absolute bottom-0 left-0 right-0 h-12 bg-gradient-to-t from-base-100 to-transparent"></div>
      </figure>

      <div class="overflow-y-auto flex-1 px-6 pt-2 pb-4 space-y-3">
        <div class="space-y-2">
          <div class="flex items-start justify-between gap-3">
            <h2 class="text-2xl font-black text-base-content leading-tight">
              {{ product().name }}
            </h2>
            <button class="relative btn btn-ghost btn-circle
         hover:bg-orange-50 transition-transform hover:scale-110
         disabled:opacity-70" (click)="toggleFavorite($event)" [disabled]="isFavLoading()"
              [attr.aria-pressed]="isFavorite()" title="Marcar como favorito">

              @if (isFavLoading()) {
              <span class="absolute inset-0 rounded-full
             ring-2 ring-orange-400/60
             animate-[fav-pulse_900ms_ease-in-out_infinite]"></span>
              }

              <lucide-icon [img]="Heart" class="w-7 h-7 transition-all duration-300
           [&>svg]:transition-all [&>svg]:duration-300 [&>svg]:stroke-current" [ngClass]="
      isFavLoading()
        ? 'text-orange-500 scale-105 [&>svg]:fill-none'
        : isFavorite()
          ? 'text-red-500 scale-110 [&>svg]:fill-current'
          : 'text-gray-400 [&>svg]:fill-none'
    "></lucide-icon>

            </button>
          </div>

          <div class="flex items-center justify-between">
            <span class="text-2xl font-black text-orange-600">
              {{ product().price | currency:'ARS' }}
            </span>
          </div>
        </div>

        <div>
          <p class="text-sm text-base-content/70 leading-relaxed line-clamp-3">
            {{ product().description }}
          </p>
        </div>

        <div class="divider my-2"></div>

        <div class="flex items-center justify-between">
          <label class="label-text font-bold text-sm">Cantidad</label>

          <div
            class="flex items-center justify-center gap-3 bg-orange-50 rounded-2xl py-1 px-2 border border-orange-200/60">
            <button class="btn btn-circle btn-sm border-0 text-white shadow-md
                     bg-gradient-to-r from-orange-500 to-amber-500
                     hover:from-orange-600 hover:to-amber-600 hover:scale-110 transition-transform
                     flex items-center justify-center p-0" (click)="decreaseQuantity()" [disabled]="quantity === 1">
              <lucide-icon [img]="Minus" [size]="16"></lucide-icon>
            </button>

            <span class="text-lg font-black min-w-[2.5rem] text-center text-[#1f1b16]">
              {{ quantity }}
            </span>

            <button class="btn btn-circle btn-sm border-0 text-white shadow-md
                     bg-gradient-to-r from-orange-500 to-amber-500
                     hover:from-orange-600 hover:to-amber-600 hover:scale-110 transition-transform"
              (click)="increaseQuantity()">
              <lucide-icon [img]="Plus" [size]="16"></lucide-icon>
            </button>
          </div>
        </div>

        @if (product().customizable) {
        <div class="space-y-1">
          <label class="label pb-0 pt-0">
            <span class="label-text font-bold text-sm">Instrucciones especiales</span>
            <span class="label-text-alt text-base-content/50 font-medium text-xs">
              {{ specialInstructions.length }}/255
            </span>
          </label>

          <textarea class="textarea w-full text-sm resize-none rounded-2xl
                     bg-base-100 border border-orange-200/70
                     focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-200/60"
            [(ngModel)]="specialInstructions" placeholder="Ej: Sin cebolla, extra salsa..." maxlength="255"
            rows="3"></textarea>
        </div>
        }
      </div>

      <div class="flex-shrink-0 border-t border-orange-200/60 px-6 py-3 space-y-2">
        <button class="btn btn-block btn-md gap-4 border-0 text-white shadow-lg
                 bg-gradient-to-r from-orange-500 to-amber-500
                 hover:from-orange-600 hover:to-amber-600
                 hover:scale-[1.02] active:scale-[0.98] transition-transform" (click)="addToCart()">
          <lucide-icon [img]="ShoppingCart" [size]="20"></lucide-icon>

          <span class="font-black text-sm">
            Agregar • {{ (product().price * quantity) | currency:'ARS' }}
          </span>
        </button>

        <button class="btn btn-ghost btn-block btn-sm hover:bg-orange-50" (click)="close.emit()">
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
