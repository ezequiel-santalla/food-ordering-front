<div class="flex items-center gap-3 rounded-2xl border border-orange-200/60
         bg-white/80 backdrop-blur
         shadow-[0_6px_18px_-14px_rgba(0,0,0,0.25)]
         p-2 hover:bg-orange-50/40 hover:shadow-[0_10px_26px_-18px_rgba(0,0,0,0.35)]
         transition-all duration-200 cursor-pointer">
  
  <figure (click)="select.emit(product)" class="w-40 aspect-[4/3] rounded-2xl overflow-hidden flex-shrink-0
         bg-orange-500/10 border border-orange-200/60">
    <img [src]="product.imageUrl || 'https://via.placeholder.com/160?text=Sin+Imagen'" [alt]="product.name"
      class="w-full h-full object-cover" />
  </figure>

  <div class="flex-1 flex gap-2 flex-col justify-between min-w-0">

    <h2 (click)="select.emit(product)" class="text-lg font-black leading-snug mb-0.5 truncate text-[#1f1b16]">
      {{ product.name }}
    </h2>

    <p (click)="select.emit(product)"
      class="text-[11px] text-[#3a332c]/70 leading-snug line-clamp-2 h-[30px] overflow-hidden">
      {{ product.description }}
    </p>
    
    <div class="flex items-center justify-between mt-1 min-h-[40px]">
      <span (click)="select.emit(product)" class="font-extrabold text-base text-orange-700">
        ${{ product.price | number:'1.0-0' }}
      </span>

      <div class="flex items-center justify-end" (click)="$event.stopPropagation()">

        <div class="relative z-0 flex items-center overflow-hidden bg-orange-50
              border border-orange-200/80 border-r-0 rounded-l-full
              h-8 min-[430px]:h-10 -mr-4 transition-all duration-300 ease-out"
          [ngClass]="quantity() > 0 ? 'w-12 min-[430px]:w-14 opacity-100' : 'w-0 opacity-0 border-transparent'">

          <span class="w-full text-center font-black text-[#1f1b16] pr-4 whitespace-nowrap text-xs min-[430px]:text-sm">
            {{ quantity() > 0 ? quantity() : '' }}
          </span>
        </div>

        <button type="button" class="relative z-10 flex items-center justify-center shrink-0 p-0
                 rounded-full border-0 text-white shadow-md
                 w-8 h-8 min-[430px]:w-10 min-[430px]:h-10
                 bg-gradient-to-r from-orange-500 to-amber-500
                 hover:from-orange-600 hover:to-amber-600 hover:scale-110
                 transition-transform duration-200 cursor-pointer" (click)="increaseQuantity($event)">
          <lucide-icon [img]="Plus" class="w-4 h-4 min-[430px]:w-5 min-[430px]:h-5"></lucide-icon>
        </button>

      </div>
    </div>

  </div>
</div>
