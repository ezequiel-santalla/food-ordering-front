<div class="flex items-center gap-3 rounded-2xl border border-orange-200/60
         bg-white/80 backdrop-blur
         shadow-[0_6px_18px_-14px_rgba(0,0,0,0.25)]
         p-2 hover:bg-orange-50/40 hover:shadow-[0_10px_26px_-18px_rgba(0,0,0,0.35)]
         transition-all duration-200 cursor-pointer">
  <figure (click)="select.emit(product)" class="w-40 aspect-[4/3] rounded-2xl overflow-hidden flex-shrink-0
         bg-orange-500/10 border border-orange-200/60">
    <img [src]="product.imageUrl || 'https://via.placeholder.com/160?text=Sin+Imagen'" [alt]="product.name"
      class="w-full h-full object-cover" />
  </figure>

  <div class="flex-1 flex gap-2 flex-col justify-between min-w-0">

    <h2 (click)="select.emit(product)" class="text-lg font-black leading-snug mb-0.5 truncate text-[#1f1b16]">
      {{ product.name }}
    </h2>

    <p (click)="select.emit(product)" class="text-[11px] text-[#3a332c]/70 leading-snug line-clamp-2 h-[30px] overflow-hidden">
      {{ product.description }}
    </p>
<div class="flex items-center justify-between mt-1 min-h-[40px]">
  <span (click)="select.emit(product)" class="font-extrabold text-base text-orange-700">
    ${{ product.price | number:'1.2-2' }}
  </span>

  <!-- MOBILE < 430px -->
  <div class="flex items-center gap-2 min-[430px]:hidden">
    
    @if (quantity() > 0) {
      <span class="text-xs font-black text-orange-700 bg-orange-50 px-2 py-1 rounded-xl border border-orange-200/60">
        {{ quantity() }}
      </span>
    }

    <button
      type="button"
      class="h-10 w-10 rounded-2xl border-0 text-white shadow-md
             bg-gradient-to-r from-orange-500 to-amber-500
             hover:from-orange-600 hover:to-amber-600
             hover:scale-105 active:scale-95 transition
             flex items-center justify-center p-0"
      (click)="increaseQuantity($event)"
      aria-label="Agregar"
    >
      <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon>
    </button>
  </div>

  <!-- ≥ 430px -->
  @if (quantity() === 0) {
    <button
      type="button"
      class="hidden min-[430px]:flex h-10 w-10 rounded-2xl border-0 text-white shadow-md
             bg-gradient-to-r from-orange-500 to-amber-500
             hover:from-orange-600 hover:to-amber-600
             hover:scale-105 active:scale-95 transition
             items-center justify-center p-0"
      (click)="increaseQuantity($event)"
      aria-label="Agregar"
    >
      <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon>
    </button>
  } @else {
    <div
      class="hidden min-[430px]:flex h-10 items-center justify-center gap-2
             bg-orange-50 rounded-2xl px-2
             border border-orange-200/60"
      (click)="$event.stopPropagation()"
    >
      <button
        type="button"
        class="btn btn-circle btn-sm border-0 text-white shadow-md
               bg-gradient-to-r from-orange-500 to-amber-500
               hover:from-orange-600 hover:to-amber-600 hover:scale-110 transition-transform
               flex items-center justify-center p-0"
        (click)="decreaseQuantity($event)"
      >
        <lucide-icon [img]="Minus" class="w-4 h-4"></lucide-icon>
      </button>

      <span class="text-sm font-black min-w-[2rem] text-center text-[#1f1b16]">
        {{ quantity() }}
      </span>

      <button
        type="button"
        class="btn btn-circle btn-sm border-0 text-white shadow-md
               bg-gradient-to-r from-orange-500 to-amber-500
               hover:from-orange-600 hover:to-amber-600 hover:scale-110 transition-transform
               flex items-center justify-center p-0"
        (click)="increaseQuantity($event)"
      >
        <lucide-icon [img]="Plus" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  }
</div>

  </div>
</div>
