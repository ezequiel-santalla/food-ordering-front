<section class="space-y-4 pb-56 overflow-y-auto min-h-0 flex-1">
  @if (isLoading()) {
    <div class="flex flex-col items-center justify-center py-12">
      <span class="loading loading-spinner loading-lg text-orange-500"></span>
      <p class="text-[#3a332c]/70 mt-4 font-semibold">Cargando pedidos de la mesa...</p>
    </div>

  } @else if (error()) {
    <div class="rounded-2xl bg-red-50 border border-red-200 p-3 text-sm text-red-700">
      {{ error() }}
    </div>

  } @else if (orders().length === 0) {
    <div class="rounded-[28px] bg-white/70 backdrop-blur border border-white shadow-xl p-8">
      <div class="flex flex-col items-center justify-center text-center py-8">
        <lucide-icon [img]="Package" [size]="64" class="text-orange-200 mb-4"></lucide-icon>
        <p class="text-[#1f1b16] font-black text-lg mb-2">No hay pedidos en esta mesa</p>
        <p class="text-sm text-[#3a332c]/60">
          Los pedidos de todos los comensales aparecerán aquí.
        </p>
      </div>
    </div>

  } @else {
    <div class="flex flex-col gap-4">
      @for (order of orders(); track order.publicId) {
        <app-order-card
          [order]="order"
          (selected)="onOrderSelected($event)"
          (cancel)="onCancelOrder($event)"
        ></app-order-card>
      }
    </div>
  }
</section>
