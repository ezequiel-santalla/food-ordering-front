<div class="h-full flex flex-col min-h-0">
  <div class="flex-shrink-0">
    <div class="flex border-b border-orange-200/60">
      <button class="flex-1 py-2 flex items-center justify-center gap-2 text-sm font-medium transition-all" [ngClass]="_activeTab() === 'pending'
          ? 'text-orange-700 border-b-2 border-orange-500'
          : 'text-[#3a332c]/60 hover:text-[#1f1b16]'" (click)="_activeTab.set('pending')">
        <lucide-icon [img]="Coins" class="w-4 h-4"></lucide-icon>
        <span>Pagar</span>
      </button>
      <button class="flex-1 py-2 flex items-center justify-center gap-2 text-sm font-medium transition-all" [ngClass]="_activeTab() === 'history'
          ? 'text-orange-700 border-b-2 border-orange-500'
          : 'text-[#3a332c]/60 hover:text-[#1f1b16]'" (click)="_activeTab.set('history')">
        <lucide-icon [img]="History" class="w-4 h-4"></lucide-icon>
        <span>Historial</span>
      </button>
    </div>
  </div>

 <div class="flex-1 min-h-0 px-3">
    @if (_activeTab() === 'pending') {
    <app-pending-payments-panel [resetScroll]="true" />
    } @else {
    <app-payment-history-panel [highlightPaymentId]="highlightPaymentId" />
    }
  </div>
</div>
