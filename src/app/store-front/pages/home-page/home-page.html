<div class="max-w-3xl mx-auto space-y-8 pb-24 mt-4 px-4">

  <div class="sm:px-6">
    <div class="w-full aspect-[4/1] overflow-hidden rounded-2xl border border-orange-200/60 shadow-sm">
      @if (currentVenueResource.isLoading()) {
      <div class="w-full h-full bg-orange-100/60 animate-pulse"></div>
      } @else if (bannerUrl()) {
      <img [src]="bannerUrl()!" alt="Banner del local" loading="eager" fetchpriority="high"
        class="w-full h-full object-cover object-center" />
      }
    </div>
  </div>

  <div>
    <div class="sm:px-6">
      <app-highlights-section title="Recomendados" [data$]="menuService.getRecommended()" variant="premium" />
    </div>
  </div>

  <div>
    <div class="sm:px-6">
      <app-highlights-section title="Más pedidos" [data$]="menuService.getTopSelling()" variant="pop" />
    </div>
  </div>

  <div>
    <div class="sm:px-6">
      <app-highlights-section title="Favoritos" emptyMessage="Aún no agregaste ningún favorito"
        [data$]="favoritesData$()" variant="minimal" />
    </div>
  </div>
</div>
