<section class="min-h-screen px-4 py-10 bg-[#fbf6ef] relative overflow-hidden flex items-center justify-center">
  <!-- Glow blobs -->
  <!-- Glow blobs -->
  <div class="pointer-events-none absolute -top-24 -right-24 w-96 h-96 rounded-full bg-orange-300/20 blur-3xl"></div>
  <div class="pointer-events-none absolute -bottom-24 -left-24 w-96 h-96 rounded-full bg-amber-400/15 blur-3xl"></div>

  <div class="w-full max-w-3xl">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="flex justify-center">
        <img src="https://res.cloudinary.com/dgjd3ybs1/image/upload/v1772114910/dinno-banner_eqcu7r.png" alt="Dinno"
          class="w-10/12 sm:w-2/3 object-contain drop-shadow" />
      </div>

      <h1 class="mt-4 text-2xl sm:text-3xl font-black text-[#1f1b16]">Seleccionar rol</h1>
      <p class="mt-2 text-[#3a332c]/70">
        Elegí con qué perfil vas a ingresar al sistema del local.
      </p>
    </div>

    <!-- Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      @for (employment of employments(); track employment.publicId) {
      <button type="button" (click)="selectEmployment(employment)" class="text-left rounded-[28px] bg-white/70 backdrop-blur border border-white shadow-md
                 hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
        <div class="p-6 flex gap-4 items-start">

          <div class="shrink-0 w-12 h-12 rounded-2xl bg-orange-500/10 flex items-center justify-center">
            <lucide-icon [img]="getIconForRole(employment.role).icon"
              class="w-7 h-7 {{ getIconForRole(employment.role).colorClass }}"></lucide-icon>
          </div>

          <div class="min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <h2 class="text-lg font-black text-[#1f1b16]">
                {{ roleDisplayNames[employment.role] || employment.role }}
              </h2>

              @if (employment.role === 'ROLE_ROOT') {
              <span class="px-2 py-0.5 rounded-xl text-[11px] font-bold
                               bg-amber-500/15 text-amber-900 border border-amber-200/60">
                Acceso total
              </span>
              }
            </div>

            <p class="mt-1 text-sm text-[#3a332c]/70 line-clamp-1">
              @if (employment.role !== 'ROLE_ROOT') {
              {{ employment.foodVenueName }}
              } @else {
              Administración global de Dinno
              }
            </p>

            <div class="mt-4 inline-flex items-center gap-2 text-sm font-bold text-orange-700">
              Entrar
              <span class="inline-block translate-y-[1px]">→</span>
            </div>
          </div>

        </div>
      </button>
      }

    </div>

    <!-- Cliente (secundario) -->
    <div class="mt-8 text-center">
      <button type="button" (click)="continueAsClient()" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-2xl
               bg-white/70 border border-orange-200/70 shadow-sm
               text-sm font-semibold text-[#1f1b16]
               hover:bg-orange-50 transition">
        <lucide-icon [img]="User" class="w-4 h-4 text-orange-700"></lucide-icon>
        Continuar como cliente
      </button>

      <p class="mt-2 text-xs text-[#3a332c]/60">
        Solo si querés explorar restaurantes y hacer pedidos.
      </p>
    </div>

  </div>
</section>
