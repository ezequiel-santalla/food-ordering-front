<section class="min-h-screen px-4 py-10 bg-[#fbf6ef] relative overflow-hidden flex items-center justify-center">

  <!-- Glow blobs -->
  <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-orange-300/20 blur-3xl"></div>
  <div class="absolute -bottom-24 -left-24 w-96 h-96 rounded-full bg-amber-400/15 blur-3xl"></div>

  <div class="w-full max-w-md relative">

    <!-- Header -->
    <div class="text-center mb-6">

      <!-- Logo Dinno -->
      <div class="flex justify-center">
        <img
          src="https://res.cloudinary.com/dgjd3ybs1/image/upload/v1772114910/dinno-banner_eqcu7r.png"
          alt="Dinno"
          class="w-10/12 sm:w-4/5 object-contain drop-shadow"
        />
      </div>

      <h1 class="mt-4 text-2xl sm:text-3xl font-black text-[#1f1b16]">
        Recuperar contraseña
      </h1>

      <p class="mt-1 text-[#3a332c]/70 text-sm sm:text-base">
        Ingresá tu email y te enviaremos las instrucciones.
      </p>
    </div>

    <!-- Card -->
    <div class="rounded-[28px] bg-white/70 backdrop-blur border border-white shadow-2xl relative overflow-hidden">

      <!-- Close -->
      <button
        (click)="onExit()"
        class="absolute right-3 top-3 btn btn-ghost btn-circle btn-sm text-[#3a332c]/60 hover:text-[#1f1b16]"
        aria-label="Cerrar y volver"
      >
        <lucide-icon [img]="X" class="w-6 h-6"></lucide-icon>
      </button>

      <div class="p-6 md:p-8">

        <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-5">

          <!-- Email -->
          <div>
            <label class="text-sm font-bold text-[#1f1b16]">
              Email registrado
            </label>

            <label
              class="mt-2 w-full h-12 px-4 rounded-2xl bg-white border border-orange-200/70 shadow-sm
                     flex items-center gap-2 focus-within:border-orange-400 transition"
            >
              <lucide-icon [img]="Mail" class="w-4 h-4 text-[#3a332c]/60"></lucide-icon>

              <input
                type="email"
                placeholder="Ej: juan.perez@example.com"
                formControlName="email"
                class="w-full bg-transparent outline-none placeholder:text-[#3a332c]/40"
                required
              />
            </label>

            @if (formUtils.isValidField(forgotForm, 'email')) {
              <span class="text-sm text-orange-700 mt-1 block">
                {{ formUtils.getTextError(forgotForm, 'email') }}
              </span>
            }
          </div>

          <!-- Button -->
          <div class="pt-2">
            <button
              type="submit"
              [disabled]="isSubmitting"
              class="w-full h-12 rounded-2xl font-bold text-white shadow-lg
                     bg-gradient-to-r from-orange-500 to-amber-500
                     hover:from-orange-600 hover:to-amber-600 transition disabled:opacity-60"
            >
              <lucide-icon [img]="Send" class="w-5 h-5 inline-block mr-2" />
              @if (isSubmitting) {
                Enviando...
              } @else {
                Enviar email
              }
            </button>
          </div>

        </form>

        <!-- Divider -->
        <div class="my-6 h-px bg-orange-200/60"></div>

        <!-- Footer -->
        <div class="text-center text-sm">
          <p class="text-[#3a332c]/70">
            ¿Recordaste tu contraseña?
            <a
              routerLink="/auth/login"
              class="text-orange-700 hover:text-orange-800 font-semibold transition"
            >
              Iniciá sesión
            </a>
          </p>
        </div>

      </div>
    </div>

  </div>
</section>
